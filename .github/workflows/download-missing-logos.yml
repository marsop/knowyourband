name: Download Missing Logos

on:
  push:
    branches: [ main, master ]

concurrency:
  group: download-missing-logos
  cancel-in-progress: true

jobs:
  download-missing-logos:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: pip install requests

    - name: Run script to download missing logos
      env:
        FANART_API_KEY: ${{ secrets.FANART_API_KEY }}
      run: python scripts/get_missing_logos.py

    - name: Commit and push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add KnowYourBand/wwwroot/images/logos/
        # Check if there are any changes to commit
        if git diff --staged --quiet; then
          echo "No new logos to commit"
        else
          git commit -m "chore: Auto-download missing band logos"
          git push
        fi
